<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#071a0e;font-family:'Pixelify Sans',monospace;padding:48px;}
svg{display:block;margin:0 auto;}
</style>
</head>
<body>
<svg width="1100" height="820" viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a8a4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ff6644" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#071a0e"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="22" font-weight="700" fill="#00ff41" letter-spacing="4">REHNUMAI — AGENT ARCHITECTURE</text>
  <text x="550" y="68" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="13" fill="#3a8a4a" letter-spacing="2">Adaptive Curriculum Engine · AI Mustaqbil 2.0</text>

  <!-- LEARNER -->
  <rect x="420" y="88" width="260" height="52" rx="8" fill="#0d2e18" stroke="#00ff41" stroke-width="1.5"/>
  <text x="550" y="108" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="15" font-weight="700" fill="#00ff41" letter-spacing="2">LEARNER</text>
  <text x="550" y="128" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">Name · Age · Subject · Answers</text>

  <!-- Arrow down -->
  <line x1="550" y1="140" x2="550" y2="170" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ASSESSMENT AGENT -->
  <rect x="360" y="170" width="380" height="72" rx="8" fill="#1a4a28" stroke="#00ff41" stroke-width="2"/>
  <text x="550" y="194" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="16" font-weight="700" fill="#00ff41" letter-spacing="2">ASSESSMENT AGENT</text>
  <text x="550" y="214" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#7fcf90" letter-spacing="1">5 diagnostic questions via Groq API</text>
  <text x="550" y="232" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">Outputs: level + age_group → shared state</text>

  <!-- Arrow down -->
  <line x1="550" y1="242" x2="550" y2="272" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CURRICULUM AGENT -->
  <rect x="360" y="272" width="380" height="72" rx="8" fill="#1a4a28" stroke="#00ff41" stroke-width="2"/>
  <text x="550" y="296" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="16" font-weight="700" fill="#00ff41" letter-spacing="2">CURRICULUM AGENT</text>
  <text x="550" y="316" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#7fcf90" letter-spacing="1">Selects 3 topics from topic bank · sequences plan</text>
  <text x="550" y="334" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">Assigns lens rotation: Factual → Critical → Humanitarian</text>

  <!-- Arrow down -->
  <line x1="550" y1="344" x2="550" y2="374" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TEACHING AGENT -->
  <rect x="360" y="374" width="380" height="72" rx="8" fill="#1a4a28" stroke="#00ff41" stroke-width="2"/>
  <text x="550" y="398" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="16" font-weight="700" fill="#00ff41" letter-spacing="2">TEACHING AGENT</text>
  <text x="550" y="418" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#7fcf90" letter-spacing="1">Generates lesson through active lens via Groq API</text>
  <text x="550" y="436" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">Adapts vocabulary to age_group + level</text>

  <!-- Arrow down -->
  <line x1="550" y1="446" x2="550" y2="476" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="562" y="465" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a">learner answers</text>

  <!-- PROGRESS AGENT -->
  <rect x="360" y="476" width="380" height="72" rx="8" fill="#1a4a28" stroke="#00ff41" stroke-width="2"/>
  <text x="550" y="500" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="16" font-weight="700" fill="#00ff41" letter-spacing="2">PROGRESS AGENT</text>
  <text x="550" y="520" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#7fcf90" letter-spacing="1">Scores answer · detects level change · routes next step</text>
  <text x="550" y="538" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">Writes next_step to state → LangGraph routes</text>

  <!-- Feedback loop back to curriculum (left side) -->
  <path d="M360 512 L220 512 L220 308 L360 308" fill="none" stroke="#ffdd44" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="146" y="395" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ffdd44" letter-spacing="1">ADAPT</text>
  <text x="146" y="412" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="11" fill="#ffdd44" opacity="0.7">level changed</text>

  <!-- Loop back to teaching (right side) -->
  <path d="M740 512 L870 512 L870 410 L740 410" fill="none" stroke="#3a8a4a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr-gray)"/>
  <text x="940" y="466" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a" letter-spacing="1">NEXT</text>
  <text x="940" y="483" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a" opacity="0.7">topic continues</text>

  <!-- END -->
  <line x1="550" y1="548" x2="550" y2="610" stroke="#3a8a4a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-gray)"/>
  <rect x="460" y="610" width="180" height="40" rx="6" fill="#0d2e18" stroke="#3a8a4a" stroke-width="1"/>
  <text x="550" y="635" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="14" fill="#3a8a4a" letter-spacing="2">END SESSION</text>

  <!-- SHARED STATE box -->
  <rect x="40" y="170" width="260" height="250" rx="8" fill="#0a2214" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="170" y="194" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="13" font-weight="700" fill="#3a8a4a" letter-spacing="2">SHARED STATE</text>
  <text x="170" y="214" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a" opacity="0.6">GeoMindState (TypedDict)</text>
  <line x1="60" y1="222" x2="280" y2="222" stroke="#3a8a4a" stroke-width="0.5" opacity="0.4"/>
  <text x="64" y="242" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› learner.name</text>
  <text x="64" y="260" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› learner.age_group</text>
  <text x="64" y="278" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› learner.level</text>
  <text x="64" y="296" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› learner.current_lens</text>
  <text x="64" y="314" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› study_plan[ ]</text>
  <text x="64" y="332" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› current_lesson</text>
  <text x="64" y="350" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› current_question</text>
  <text x="64" y="368" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› next_step</text>
  <text x="64" y="386" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">› score · questions_asked</text>
  <!-- dotted lines from state to each agent -->
  <line x1="300" y1="206" x2="360" y2="206" stroke="#3a8a4a" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="300" y1="308" x2="360" y2="308" stroke="#3a8a4a" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="300" y1="410" x2="360" y2="410" stroke="#3a8a4a" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="300" y1="512" x2="360" y2="512" stroke="#3a8a4a" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- GUARDRAILS box -->
  <rect x="800" y="272" width="260" height="180" rx="8" fill="#0a2214" stroke="#ff6644" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="930" y="296" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="13" font-weight="700" fill="#ff6644" letter-spacing="2">GUARDRAILS</text>
  <line x1="820" y1="304" x2="1040" y2="304" stroke="#ff6644" stroke-width="0.5" opacity="0.4"/>
  <text x="824" y="324" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ff6644">① Age content filter</text>
  <text x="824" y="342" font-family="'Pixelify Sans',monospace" font-size="11" fill="#ff6644" opacity="0.6">  child / teen / adult</text>
  <text x="824" y="364" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ff6644">② Neutrality checker</text>
  <text x="824" y="382" font-family="'Pixelify Sans',monospace" font-size="11" fill="#ff6644" opacity="0.6">  geopolitics only</text>
  <text x="824" y="404" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ff6644">③ Answer safety monitor</text>
  <text x="824" y="422" font-family="'Pixelify Sans',monospace" font-size="11" fill="#ff6644" opacity="0.6">  distress + hate speech</text>
  <text x="824" y="444" font-family="'Pixelify Sans',monospace" font-size="11" fill="#ff6644" opacity="0.5">  runs on every request</text>
  <!-- line from teaching to guardrails -->
  <line x1="740" y1="374" x2="800" y2="362" stroke="#ff6644" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- TECH STACK -->
  <rect x="800" y="476" width="260" height="110" rx="8" fill="#0a2214" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="930" y="500" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="13" font-weight="700" fill="#3a8a4a" letter-spacing="2">TECH STACK</text>
  <line x1="820" y1="508" x2="1040" y2="508" stroke="#3a8a4a" stroke-width="0.5" opacity="0.4"/>
  <text x="824" y="528" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">Python + LangGraph</text>
  <text x="824" y="548" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">Groq API · Llama 3.3 70B</text>
  <text x="824" y="568" font-family="'Pixelify Sans',monospace" font-size="12" fill="#3a8a4a">Flask · HTML/CSS/JS</text>

  <!-- LENS legend -->
  <rect x="40" y="452" width="260" height="120" rx="8" fill="#0a2214" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="170" y="476" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="13" font-weight="700" fill="#3a8a4a" letter-spacing="2">LENS ROTATION</text>
  <line x1="60" y1="484" x2="280" y2="484" stroke="#3a8a4a" stroke-width="0.5" opacity="0.4"/>
  <text x="64" y="504" font-family="'Pixelify Sans',monospace" font-size="12" fill="#00ff41">LENS-01  Neutral &amp; Factual</text>
  <text x="64" y="524" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ffdd44">LENS-02  Critical Thinking</text>
  <text x="64" y="544" font-family="'Pixelify Sans',monospace" font-size="12" fill="#ff6644">LENS-03  Humanitarian</text>
  <text x="64" y="562" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a" opacity="0.7">Hardcoded rotation per topic</text>

  <!-- Subjects bar — centered under pipeline (x=360 to x=740, width=380, center=550) -->
  <rect x="360" y="668" width="380" height="32" rx="6" fill="#0a2214" stroke="#3a8a4a" stroke-width="1" opacity="0.9"/>
  <text x="380" y="689" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a" letter-spacing="1">SUBJECTS:</text>
  <text x="475" y="689" font-family="'Pixelify Sans',monospace" font-size="12" fill="#00ff41">MATHS</text>
  <text x="570" y="689" font-family="'Pixelify Sans',monospace" font-size="12" fill="#00ff41">SCIENCE</text>
  <text x="660" y="689" font-family="'Pixelify Sans',monospace" font-size="11" fill="#00ff41">GEO</text>

  <!-- Diagram key box — right side below tech stack -->
  <rect x="800" y="600" width="260" height="110" rx="8" fill="#0a2214" stroke="#3a8a4a" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="930" y="622" text-anchor="middle" font-family="'Pixelify Sans',monospace" font-size="12" font-weight="700" fill="#3a8a4a" letter-spacing="2">DIAGRAM KEY</text>
  <line x1="820" y1="630" x2="1040" y2="630" stroke="#3a8a4a" stroke-width="0.5" opacity="0.4"/>
  <line x1="820" y1="649" x2="848" y2="649" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="856" y="653" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a">Pipeline flow</text>
  <line x1="820" y1="667" x2="848" y2="667" stroke="#ffdd44" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="856" y="671" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a">Adaptation loop</text>
  <line x1="820" y1="685" x2="848" y2="685" stroke="#3a8a4a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-gray)"/>
  <text x="856" y="689" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a">Next topic</text>
  <line x1="820" y1="700" x2="848" y2="700" stroke="#ff6644" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.8"/>
  <text x="856" y="704" font-family="'Pixelify Sans',monospace" font-size="11" fill="#3a8a4a">Guardrail pipeline</text>
</svg>
</body>
</html>
